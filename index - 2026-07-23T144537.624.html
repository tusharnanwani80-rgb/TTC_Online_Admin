<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTC Online Ledger</title>
    
    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #E2E8F0; color: #1E293B; }
        
        /* Productivity Theme Colors */
        .bg-teal-dark { background-color: #1A3644; }
        .text-teal-dark { color: #1A3644; }
        .bg-peach-accent { background-color: #FFB075; }
        .text-peach-accent { color: #FFB075; }
        
        /* Modern Floating Cards */
        .card-modern { background: white; border-radius: 28px; box-shadow: 0 15px 35px -5px rgba(26,54,68,0.1); padding: 24px; position: relative; overflow: hidden; }
        
        /* Sleek Inputs & Buttons */
        .input-sleek { background-color: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 16px; padding: 14px 20px; font-weight: 500; transition: all 0.3s; width: 100%; color: #1E293B;}
        .input-sleek:focus { border-color: #FFB075; outline: none; background-color: white; box-shadow: 0 0 0 4px rgba(255,176,117,0.15); }
        
        .btn-pill { border-radius: 99px; font-weight: 600; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-pill:active { transform: scale(0.96); }
        .btn-pill:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        /* Micro Progress Bar */
        .bar-track { background-color: #F1F5F9; height: 8px; border-radius: 99px; overflow: hidden; width: 100%; }
        .bar-fill { background-color: #1A3644; height: 100%; border-radius: 99px; transition: width 0.5s ease; }

        /* Smooth Modals */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,54,68,0.6); z-index: 50; backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 16px; opacity: 0; transition: opacity 0.2s ease;}
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content { background: white; border-radius: 32px; width: 100%; max-w: 500px; padding: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); max-height: 90vh; overflow-y: auto; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .info-dot { width: 18px; height: 18px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; background: #E2E8F0; color: #64748B; font-size: 11px; font-weight: 800; cursor: pointer; }
        .tip-pop { position: fixed; z-index: 80; max-width: 240px; background: #1A3644; color: white; border-radius: 14px; padding: 10px 12px; font-size: 12px; font-weight: 600; box-shadow: 0 14px 30px rgba(15, 23, 42, 0.25); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Top Header Area (Dark Teal) -->
    <div class="bg-teal-dark pt-12 pb-24 px-6 md:px-12 rounded-b-[40px] shadow-xl relative z-0">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-white rounded-[20px] p-1 shadow-lg transform rotate-3">
                    <img src="https://iili.io/CHHuZ6g.md.png" alt="Logo" class="w-full h-full rounded-[16px] object-cover">
                </div>
                <div>
                    <p class="text-peach-accent font-semibold text-sm mb-1">Total Control</p>
                    <h1 class="text-3xl font-extrabold text-white tracking-tight">Online Ledger</h1>
                </div>
            </div>
            
            <button onclick="openModal('addStudentModal')" class="bg-peach-accent text-white hover:bg-[#F29F60] btn-pill py-3 px-8 shadow-lg shadow-orange-500/30 gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                New Student Profile
            </button>
        </div>
    </div>

    <!-- Main Dashboard Content -->
    <div class="max-w-6xl mx-auto px-4 md:px-8 w-full -mt-16 z-10 pb-20">
        <div id="loading" class="text-center p-12 bg-white rounded-3xl shadow-xl w-full max-w-md mx-auto mt-10">
            <div class="w-12 h-12 border-4 border-peach-accent border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="font-bold text-teal-dark text-lg">Syncing Database...</p>
        </div>
        
        <div id="dashboard" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 hidden items-start"></div>
    </div>

    <!-- MODAL: ADD STUDENT -->
    <div id="addStudentModal" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <div><h2 class="text-2xl font-extrabold text-teal-dark">New Student</h2></div>
                <button onclick="closeModal('addStudentModal')" class="bg-gray-100 p-2 rounded-full hover:bg-gray-200 text-gray-500 transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <form onsubmit="submitAddStudent(event)" class="space-y-4">
                <div class="flex gap-4">
                    <div class="flex-[2]"><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Student Name</label><input type="text" id="as-name" required class="input-sleek mt-1" placeholder="e.g. Ayaan"></div>
                    <div class="flex-1"><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">TTC ID</label><input type="text" id="as-ttcid" required class="input-sleek mt-1" placeholder="e.g. TTC02"></div>
                </div>
                <div><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Parent Name</label><input type="text" id="as-parent" required class="input-sleek mt-1" placeholder="e.g. Mr. Khan"></div>
                <div><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Phone Number</label><input type="text" id="as-phone" required class="input-sleek mt-1" placeholder="Links siblings automatically"></div>
                <div class="h-px bg-gray-100 w-full my-4"></div>
                <div><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">First Batch</label><input type="text" id="as-batch" required class="input-sleek mt-1" placeholder="e.g. Math - Morning 7 AM"></div>
                <div class="flex gap-4">
                    <div class="flex-1"><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Classes</label><input type="number" id="as-total" required class="input-sleek mt-1" value="24"></div>
                    <div class="flex-1"><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Fee (₹)</label><input type="number" id="as-fee" required class="input-sleek mt-1" placeholder="0"></div>
                </div>
                <button type="submit" class="bg-teal-dark text-white btn-pill w-full py-4 mt-6 shadow-lg shadow-teal-dark/30 text-lg">Save Profile</button>
            </form>
        </div>
    </div>

    <!-- MODAL: EDIT STUDENT -->
    <div id="editStudentModal" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <div><h2 class="text-2xl font-extrabold text-teal-dark">Edit Profile</h2></div>
                <button onclick="closeModal('editStudentModal')" class="bg-gray-100 p-2 rounded-full hover:bg-gray-200 text-gray-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <form onsubmit="submitEditStudent(event)" class="space-y-4">
                <input type="hidden" id="es-studentId">
                <div><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Student Name</label><input type="text" id="es-name" required class="input-sleek mt-1"></div>
                <div><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Parent Name</label><input type="text" id="es-parent" required class="input-sleek mt-1"></div>
                <div><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Phone Number</label><input type="text" id="es-phone" required class="input-sleek mt-1"></div>
                <button type="submit" class="bg-teal-dark text-white btn-pill w-full py-4 mt-6 shadow-lg text-lg">Update Profile</button>
            </form>
        </div>
    </div>

    <!-- MODAL: ADD PACKAGE -->
    <div id="addPackageModal" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-extrabold text-teal-dark">Assign Batch</h2>
                <button onclick="closeModal('addPackageModal')" class="bg-gray-100 p-2 rounded-full hover:bg-gray-200 text-gray-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <form onsubmit="submitAddPackage(event)" class="space-y-4">
                <input type="hidden" id="ap-studentId">
                <div><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Batch Name</label><input type="text" id="ap-batch" required class="input-sleek mt-1" placeholder="e.g. Science - Evening"></div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Fee Plan</label>
                    <select id="ap-planMode" onchange="toggleAddPackagePlanMode()" class="input-sleek mt-1">
                        <option value="new">Create new fee plan</option>
                        <option value="existing">Add to existing combined plan</option>
                    </select>
                </div>
                <div id="ap-existing-wrap" class="hidden">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Existing Plan</label>
                    <select id="ap-planId" class="input-sleek mt-1"></select>
                </div>
                <div id="ap-new-plan-wrap" class="space-y-4">
                    <div><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Plan Name</label><input type="text" id="ap-planName" class="input-sleek mt-1" placeholder="e.g. Morning + Evening"></div>
                    <div><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Plan Fee</label><input type="number" id="ap-planFee" class="input-sleek mt-1" placeholder="e.g. 7000"></div>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1"><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Classes</label><input type="number" id="ap-total" required class="input-sleek mt-1" value="24"></div>
                    <div class="flex-1"><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Fee (₹)</label><input type="number" id="ap-fee" required class="input-sleek mt-1"></div>
                </div>
                <button type="submit" class="bg-teal-dark text-white btn-pill w-full py-4 mt-6 shadow-lg text-lg">Add Batch</button>
            </form>
        </div>
    </div>

    <!-- MODAL: EDIT PACKAGE -->
    <div id="editPackageModal" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-extrabold text-teal-dark">Edit Batch</h2>
                <button onclick="closeModal('editPackageModal')" class="bg-gray-100 p-2 rounded-full hover:bg-gray-200 text-gray-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <form onsubmit="submitEditPackage(event)" class="space-y-4">
                <input type="hidden" id="ep-packageId">
                <div><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Batch Name</label><input type="text" id="ep-batch" required class="input-sleek mt-1"></div>
                <div class="flex gap-4">
                    <div class="flex-1"><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Classes</label><input type="number" id="ep-total" required class="input-sleek mt-1"></div>
                    <div class="flex-1"><label class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-2">Fee (₹)</label><input type="number" id="ep-fee" required class="input-sleek mt-1"></div>
                </div>
                <button type="submit" class="bg-teal-dark text-white btn-pill w-full py-4 mt-6 shadow-lg text-lg">Update Batch</button>
            </form>
        </div>
    </div>

    <script>
        // --- API URL HERE ---
        const API_URL = "https://script.google.com/macros/s/AKfycbyBSi0CtiW1SfEhQ_P9yAXRd5CCLXc6B6I9I0P_HEZ2BlBA92yIu17eOv0h9N_avers3Q/exec"; 
        let globalData = [];
        let activeRequestCount = 0;
        
        function cloneData(data) {
            return JSON.parse(JSON.stringify(data || []));
        }

        function makeId(prefix) {
            return `${prefix}-${Date.now()}-${Math.floor(Math.random() * 9000 + 1000)}`;
        }

        function closeAllModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
        }

        function setInitialLoading(isLoading) {
            document.getElementById('loading').style.display = isLoading ? 'block' : 'none';
            document.getElementById('dashboard').style.display = isLoading ? 'none' : 'grid';
        }
        
        async function loadData(silent = false) {
            if (!silent && !globalData.length) setInitialLoading(true);
            try {
                const response = await fetch(`${API_URL}?action=getAllAdmin&t=${new Date().getTime()}`);
                const result = await response.json();
                if (!result.success) throw new Error(result.error || "Could not load data.");
                globalData = result.data || [];
                renderDashboard(globalData);
            } catch (error) {
                if (!silent) {
                    alert("Failed to sync. Check network.");
                    setInitialLoading(false);
                }
            }
        }

        async function syncAction(payload, optimisticUpdate) {
            const snapshot = cloneData(globalData);
            closeAllModals();

            if (optimisticUpdate) {
                optimisticUpdate();
                renderDashboard(globalData);
            }

            activeRequestCount++;
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                if (!result.success) throw new Error(result.error || "Action failed.");
                return result;
            } catch(e) {
                globalData = snapshot;
                renderDashboard(globalData);
                alert("The action did not save, so I restored the previous view. Please check your connection and try again.");
                return { success: false, error: e.toString() };
            } finally {
                activeRequestCount = Math.max(0, activeRequestCount - 1);
            }
        }

        function groupPackagesByPlan(packages) {
            const plans = {};
            packages.forEach(pkg => {
                const planId = pkg.PlanID || pkg.PackageID;
                if (!plans[planId]) {
                    plans[planId] = {
                        PlanID: planId,
                        PlanName: pkg.PlanName || pkg.PackageName,
                        PlanFee: Number(pkg.PlanFee || pkg.Fee || 0),
                        PlanStatus: pkg.PlanStatus || (pkg.Status === 'Unpaid' ? 'Unpaid' : 'Active'),
                        packages: []
                    };
                }
                plans[planId].packages.push(pkg);
                if ((pkg.PlanStatus || pkg.Status) === 'Unpaid') plans[planId].PlanStatus = 'Unpaid';
            });
            return Object.values(plans).map(plan => ({
                ...plan,
                IsComplete: plan.packages.every(pkg => Number(pkg.ClassesUsed) >= Number(pkg.TotalClasses))
            })).sort((a, b) => {
                const order = { "Unpaid": 0, "Active": 1, "Completed": 2 };
                return (order[a.PlanStatus] ?? 9) - (order[b.PlanStatus] ?? 9);
            });
        }

        function packageHelpText(pkg, plan) {
            const left = Math.max(0, Number(pkg.TotalClasses) - Number(pkg.ClassesUsed));
            if (Number(pkg.ClassesUsed) >= Number(pkg.TotalClasses) && !plan.IsComplete) {
                return `${pkg.PackageName} is complete here. Extra classes start in the next plan while the other batch finishes.`;
            }
            if (left === 0) return `${pkg.PackageName} has finished all agreed classes in this plan.`;
            return `${pkg.ClassesUsed} of ${pkg.TotalClasses} classes done. ${left} classes pending.`;
        }

        function tipClick(text) {
            return `onclick='toggleInfoTip(event, ${JSON.stringify(text).replace(/'/g, "&apos;")})'`;
        }

        function findExistingNextPlan(family, sourcePlan, triggerPkg) {
            return groupPackagesByPlan(family.students.flatMap(student => student.packages)).find(plan =>
                plan.PlanID !== sourcePlan.PlanID &&
                plan.PlanStatus === 'Unpaid' &&
                plan.PlanName === sourcePlan.PlanName &&
                Number(plan.PlanFee) === Number(sourcePlan.PlanFee) &&
                plan.packages.some(pkg =>
                    pkg.StudentID === triggerPkg.StudentID &&
                    pkg.PackageName === triggerPkg.PackageName
                )
            );
        }

        function findExistingRenewedPlan(family, sourcePlan) {
            return sourcePlan.packages
                .map(pkg => findExistingNextPlan(family, sourcePlan, pkg))
                .find(Boolean);
        }

        function toggleInfoTip(event, text) {
            event.stopPropagation();
            document.querySelectorAll('.tip-pop').forEach(tip => tip.remove());
            const rect = event.currentTarget.getBoundingClientRect();
            const tip = document.createElement('div');
            tip.className = 'tip-pop';
            tip.textContent = text;
            document.body.appendChild(tip);
            const left = Math.min(window.innerWidth - tip.offsetWidth - 12, Math.max(12, rect.left - 8));
            const top = Math.min(window.innerHeight - tip.offsetHeight - 12, rect.bottom + 8);
            tip.style.left = `${left}px`;
            tip.style.top = `${top}px`;
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.tip-pop').forEach(tip => tip.remove());
        });

        function renderDashboard(families) {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';

            const studentEntries = [];
            families.forEach(family => {
                family.students.forEach(student => {
                    const hasAwaitingPayment = student.packages.some(pkg => (pkg.PlanStatus || pkg.Status) === "Unpaid");
                    studentEntries.push({ family, student, priority: hasAwaitingPayment ? 0 : 1 });
                });
            });

            studentEntries.sort((a, b) => {
                if (a.priority !== b.priority) return a.priority - b.priority;
                return String(a.student.StudentName).localeCompare(String(b.student.StudentName));
            });

            studentEntries.forEach(entry => {
                    const family = entry.family;
                    const student = entry.student;
                    const safeStudentName = student.StudentName.replace(/'/g, "&apos;");
                    const safeParentName = family.ParentName.replace(/'/g, "&apos;");
                    const phone = family.Phone;
                    
                    let html = `
                        <div class="card-modern flex flex-col h-full border border-gray-100">
                            <!-- Header (Student Profile) -->
                            <div class="flex justify-between items-start mb-6 pb-4 border-b border-gray-100">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 rounded-full bg-peach-accent/20 text-peach-accent flex items-center justify-center font-bold text-xl">${student.StudentName.charAt(0)}</div>
                                    <div>
                                        <h3 class="font-extrabold text-xl text-teal-dark leading-tight">${student.StudentName}</h3>
                                        <div class="flex gap-2 mt-1">
                                            <span class="inline-block px-2 py-0.5 bg-gray-100 text-gray-500 rounded font-semibold text-[10px] uppercase tracking-widest">ID: ${student.StudentID}</span>
                                            <span class="inline-block px-2 py-0.5 bg-teal-50 text-teal-600 rounded font-semibold text-[10px] tracking-widest">${family.ParentName}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex gap-1">
                                    <button onclick="openEditStudent('${student.StudentID}', '${safeStudentName}', '${safeParentName}', '${phone}')" class="text-gray-400 hover:text-teal-dark p-2 bg-gray-50 rounded-full transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                                    <button onclick="deleteStudent('${student.StudentID}', '${safeStudentName}')" class="text-red-400 hover:text-red-600 p-2 bg-red-50 rounded-full transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                </div>
                            </div>
                            
                            <!-- Batches Container -->
                            <div class="space-y-4 flex-grow mb-6">
                    `;
                    
                    if(student.packages.length === 0) html += `<div class="bg-gray-50 rounded-2xl p-6 text-center text-sm font-medium text-gray-400">No active batches.</div>`;

                    groupPackagesByPlan(student.packages).forEach(plan => {
                        const isPlanUnpaid = plan.PlanStatus === "Unpaid";
                        const planHelp = plan.packages.length > 1
                            ? `This fee plan includes ${plan.packages.length} batches under one agreed fee.`
                            : `This batch has its own fee plan.`;
                        const hasCompletedBatch = plan.packages.some(pkg => Number(pkg.ClassesUsed) >= Number(pkg.TotalClasses));
                        const renewedPlan = findExistingRenewedPlan(family, plan);
                        html += `
                                <div class="rounded-2xl p-4 border ${isPlanUnpaid ? 'bg-red-50 border-red-100' : 'bg-[#F8FAFC] border-gray-100'}">
                                    <div class="flex items-start justify-between gap-3 mb-3">
                                        <div>
                                            <div class="flex items-center gap-2">
                                                <h4 class="font-extrabold text-teal-dark text-sm">${plan.PlanName}</h4>
                                                <span class="info-dot" ${tipClick(planHelp)}>?</span>
                                            </div>
                                            <p class="text-[11px] font-bold text-gray-400 mt-0.5">Fee plan: ₹${plan.PlanFee}</p>
                                        </div>
                                        <div class="flex items-center gap-2 flex-wrap justify-end">
                                            ${hasCompletedBatch && !renewedPlan ? `<button onclick="renewPlan('${plan.PlanID}')" class="btn-pill px-3 py-1.5 text-xs bg-teal-dark text-white hover:bg-[#122630]">Renew Plan</button>` : ``}
                                            ${renewedPlan ? `<span class="shrink-0 px-2 py-1 rounded-full bg-blue-100 text-blue-700 text-[10px] font-extrabold uppercase tracking-wider">Renewed</span>` : ``}
                                            ${isPlanUnpaid ? `<button onclick="markPaid('${plan.PlanID}')" class="btn-pill px-3 py-1.5 text-xs bg-white border border-red-200 text-red-600 hover:bg-red-50">Paid</button>` : ``}
                                            <span class="shrink-0 px-2 py-1 rounded-full ${isPlanUnpaid ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'} text-[10px] font-extrabold uppercase tracking-wider">${isPlanUnpaid ? 'Awaiting Payment' : 'Paid'}</span>
                                        </div>
                                    </div>
                        `;

                        plan.packages.forEach(pkg => {
                            const remaining = Math.max(0, Number(pkg.TotalClasses) - Number(pkg.ClassesUsed));
                            const isDone = Number(pkg.ClassesUsed) >= Number(pkg.TotalClasses);
                            const percent = Math.min(100, Math.round((Number(pkg.ClassesUsed) / Number(pkg.TotalClasses)) * 100));
                            const safePkg = JSON.stringify(pkg).replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                            html += `
                                    <div class="bg-white rounded-xl p-3 border border-white/80 mb-2 last:mb-0 relative group">
                                        <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onclick='openEditPackage(${safePkg})' class="text-gray-400 hover:text-teal-dark p-1.5 bg-white rounded-lg shadow-sm border border-gray-100"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                                            <button onclick="deletePackage('${pkg.PackageID}', '${pkg.PackageName}')" class="text-gray-400 hover:text-red-500 p-1.5 bg-white rounded-lg shadow-sm border border-gray-100"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                        </div>
                                        <div class="flex items-center gap-2 pr-14 mb-2">
                                            <h5 class="font-bold text-gray-800 text-sm truncate">${pkg.PackageName}</h5>
                                            <span class="info-dot" ${tipClick(packageHelpText(pkg, plan))}>?</span>
                                            ${isDone ? `<span class="px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 text-[10px] font-extrabold uppercase">Complete</span>` : ``}
                                        </div>
                                        <div class="flex items-center gap-3">
                                            <div class="w-10 h-10 rounded-full border-4 ${isDone ? 'border-red-500 text-red-600' : 'border-peach-accent text-teal-dark'} flex items-center justify-center font-bold text-sm bg-white shrink-0">${pkg.ClassesUsed}</div>
                                            <div class="flex-grow">
                                                <div class="flex justify-between text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-wide">
                                                    <span>${remaining} left</span>
                                                    <span>${pkg.ClassesUsed}/${pkg.TotalClasses}</span>
                                                </div>
                                                <div class="bar-track h-1.5"><div class="bar-fill ${isDone ? 'bg-red-500' : 'bg-teal-dark'}" style="width: ${percent}%;"></div></div>
                                            </div>
                                        </div>
                                        <div class="flex gap-2 mt-3">
                                            <button onclick="undoClass('${pkg.PackageID}')" ${Number(pkg.ClassesUsed) === 0 ? 'disabled' : ''} class="btn-pill px-3 bg-white border border-gray-200 text-gray-500 hover:text-red-500 hover:bg-red-50 hover:border-red-100 shadow-sm transition-colors" title="Undo last class">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                                            </button>
                                            <button onclick="logClass('${pkg.PackageID}')" ${isDone ? 'disabled' : ''} class="flex-grow btn-pill py-2.5 text-sm ${isDone ? 'bg-green-500 text-white opacity-80 cursor-not-allowed' : isPlanUnpaid ? 'bg-red-500 text-white hover:bg-red-600 shadow-md' : 'bg-teal-dark text-white hover:bg-[#122630] shadow-md'}">
                                                ${isDone ? 'Completed' : 'Mark Class'}
                                            </button>
                                        </div>
                                    </div>
                            `;
                        });
                        html += `
                                </div>
                        `;
                    });

                    html += `
                            </div>
                            <button onclick="openAddPackage('${student.StudentID}')" class="w-full btn-pill py-3 text-sm font-semibold bg-gray-50 text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors border border-dashed border-gray-300">
                                + Assign New Batch
                            </button>
                        </div>
                    `;
                    dashboard.innerHTML += html;
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
        }

        function generateDots(total, used) {
            let html = '';
            for(let i = 1; i <= total; i++) {
                if(i <= used) {
                    html += `<div class="aspect-square rounded-md bg-green-500 text-white flex items-center justify-center shadow-sm"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>`;
                } else {
                    html += `<div class="aspect-square rounded-md bg-gray-100 border border-gray-200"></div>`;
                }
            }
            return html;
        }

        // --- Core Operations ---
        function findPackage(packageId) {
            for (const family of globalData) {
                for (const student of family.students) {
                    const pkg = student.packages.find(p => p.PackageID === packageId);
                    if (pkg) return { family, student, pkg };
                }
            }
            return null;
        }

        function getFamilyPlanPackages(family, planId) {
            const packages = [];
            family.students.forEach(student => {
                student.packages.forEach(pkg => {
                    if ((pkg.PlanID || pkg.PackageID) === planId) packages.push({ student, pkg });
                });
            });
            return packages;
        }

        function addNextPlanOptimistically(family, sourcePlanPackages, triggerPackageId, renewedPlanId, renewedPackageId, logTriggerClass) {
            sourcePlanPackages.forEach((item, index) => {
                const isTrigger = item.pkg.PackageID === triggerPackageId;
                item.student.packages.push({
                    ...item.pkg,
                    PackageID: isTrigger ? renewedPackageId : makeId('PKG'),
                    PlanID: renewedPlanId,
                    ClassesUsed: isTrigger && logTriggerClass ? 1 : 0,
                    Status: 'Active',
                    PlanStatus: 'Unpaid'
                });
            });
        }

        function logClass(packageId) {
            const target = findPackage(packageId);
            if (!target) return;
            if (Number(target.pkg.ClassesUsed) >= Number(target.pkg.TotalClasses)) return;

            syncAction({ action: 'logClass', packageId: packageId }, () => {
                target.pkg.ClassesUsed = Number(target.pkg.ClassesUsed) + 1;
                const becameDone = Number(target.pkg.ClassesUsed) >= Number(target.pkg.TotalClasses);
                if (becameDone) target.pkg.Status = 'Completed';
            });
        }

        function renewPlan(planId) {
            const targetFamily = globalData.find(family =>
                family.students.some(student => student.packages.some(pkg => (pkg.PlanID || pkg.PackageID) === planId))
            );
            if (!targetFamily) return;
            const planPackages = getFamilyPlanPackages(targetFamily, planId);
            if (!planPackages.length) return;

            const renewedPlanId = makeId('PLAN');
            const renewedPackages = planPackages.map(item => ({
                sourcePackageId: item.pkg.PackageID,
                newPackageId: makeId('PKG')
            }));

            syncAction({ action: 'renewPlan', planId: planId, renewedPlanId: renewedPlanId, renewedPackages: renewedPackages }, () => {
                planPackages.forEach((item, index) => {
                    item.student.packages.push({
                        ...item.pkg,
                        PackageID: renewedPackages[index].newPackageId,
                        PlanID: renewedPlanId,
                        ClassesUsed: 0,
                        Status: 'Active',
                        PlanStatus: 'Unpaid'
                    });
                });
            });
        }
        
        function markPaid(planId) {
            syncAction({ action: 'markPaid', planId: planId }, () => {
                globalData.forEach(family => family.students.forEach(student => student.packages.forEach(pkg => {
                    if ((pkg.PlanID || pkg.PackageID) === planId) {
                        pkg.PlanStatus = 'Active';
                        if (pkg.Status === 'Unpaid') pkg.Status = 'Active';
                    }
                })));
            });
        }

        function undoClass(packageId) {
            if(!confirm("Undo the last class logged? This restores 1 credit.")) return;
            syncAction({ action: 'undoClass', packageId: packageId }, () => {
                const target = findPackage(packageId);
                if (!target || Number(target.pkg.ClassesUsed) <= 0) return;

                const wasCompletedAtFinalClass = target.pkg.Status === 'Completed' && Number(target.pkg.ClassesUsed) >= Number(target.pkg.TotalClasses);
                target.pkg.ClassesUsed = Number(target.pkg.ClassesUsed) - 1;
                target.pkg.Status = 'Active';

                const planId = target.pkg.PlanID || target.pkg.PackageID;
                const planPackages = getFamilyPlanPackages(target.family, planId);
                if (target.pkg.PlanStatus === 'Unpaid' && planPackages.every(item => Number(item.pkg.ClassesUsed) === 0)) {
                    target.family.students.forEach(student => {
                        student.packages = student.packages.filter(pkg => (pkg.PlanID || pkg.PackageID) !== planId);
                    });
                } else if (wasCompletedAtFinalClass) {
                    const emptyRenewalPlans = groupPackagesByPlan(target.family.students.flatMap(student => student.packages))
                        .filter(plan =>
                            plan.PlanStatus === 'Unpaid' &&
                            plan.PlanName === (target.pkg.PlanName || target.pkg.PackageName) &&
                            Number(plan.PlanFee) === Number(target.pkg.PlanFee || target.pkg.Fee || 0) &&
                            plan.packages.every(pkg => Number(pkg.ClassesUsed) === 0)
                        );
                    emptyRenewalPlans.forEach(plan => {
                        target.family.students.forEach(student => {
                            student.packages = student.packages.filter(pkg => (pkg.PlanID || pkg.PackageID) !== plan.PlanID);
                        });
                    });
                }
            });
        }

        function deleteStudent(studentId, name) {
            if(confirm(`Delete ${name} and all associated data completely?`)) {
                syncAction({ action: 'deleteStudent', studentId: studentId }, () => {
                    globalData.forEach(family => {
                        family.students = family.students.filter(student => student.StudentID !== studentId);
                    });
                    globalData = globalData.filter(family => family.students.length > 0);
                });
            }
        }

        function deletePackage(packageId, name) {
            if(confirm(`Remove the batch "${name}" from this student?`)) {
                syncAction({ action: 'deletePackage', packageId: packageId }, () => {
                    globalData.forEach(family => family.students.forEach(student => {
                        student.packages = student.packages.filter(pkg => pkg.PackageID !== packageId);
                    }));
                });
            }
        }

        // --- Modals ---
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function submitAddStudent(e) {
            e.preventDefault();
            const studentId = document.getElementById('as-ttcid').value.trim().toUpperCase();
            const packageId = makeId('PKG');
            const payload = {
                action: 'addStudent',
                studentId: studentId,
                studentName: document.getElementById('as-name').value,
                parentName: document.getElementById('as-parent').value,
                phone: document.getElementById('as-phone').value,
                packageId: packageId,
                planId: makeId('PLAN'),
                planName: document.getElementById('as-batch').value,
                planFee: Number(document.getElementById('as-fee').value),
                packageName: document.getElementById('as-batch').value,
                totalClasses: Number(document.getElementById('as-total').value),
                fee: Number(document.getElementById('as-fee').value)
            };

            syncAction(payload, () => {
                let family = globalData.find(f => String(f.Phone) === String(payload.phone));
                if (!family) {
                    family = { FamilyID: makeId('FAM'), ParentName: payload.parentName, Phone: payload.phone, students: [] };
                    globalData.push(family);
                }
                family.ParentName = payload.parentName;
                family.students.push({
                    StudentID: payload.studentId,
                    FamilyID: family.FamilyID,
                    StudentName: payload.studentName,
                    packages: [{
                        PackageID: payload.packageId,
                        StudentID: payload.studentId,
                        PackageName: payload.packageName,
                        TotalClasses: payload.totalClasses,
                        ClassesUsed: 0,
                        Fee: payload.fee,
                        Status: 'Active',
                        PlanID: payload.planId,
                        PlanName: payload.planName,
                        PlanFee: payload.planFee,
                        PlanStatus: 'Active'
                    }]
                });
            });
            e.target.reset();
        }

        function openEditStudent(id, sName, pName, phone) {
            document.getElementById('es-studentId').value = id; document.getElementById('es-name').value = sName;
            document.getElementById('es-parent').value = pName; document.getElementById('es-phone').value = phone;
            openModal('editStudentModal');
        }
        function submitEditStudent(e) {
            e.preventDefault();
            const payload = {
                action: 'editStudent', studentId: document.getElementById('es-studentId').value, studentName: document.getElementById('es-name').value,
                parentName: document.getElementById('es-parent').value, phone: document.getElementById('es-phone').value
            };
            syncAction(payload, () => {
                globalData.forEach(family => family.students.forEach(student => {
                    if (student.StudentID === payload.studentId) {
                        student.StudentName = payload.studentName;
                        family.ParentName = payload.parentName;
                        family.Phone = payload.phone;
                    }
                }));
            });
        }

        function findStudentContext(studentId) {
            for (const family of globalData) {
                for (const student of family.students) {
                    if (student.StudentID === studentId) return { family, student };
                }
            }
            return null;
        }

        function toggleAddPackagePlanMode() {
            const mode = document.getElementById('ap-planMode').value;
            document.getElementById('ap-existing-wrap').classList.toggle('hidden', mode !== 'existing');
            document.getElementById('ap-new-plan-wrap').classList.toggle('hidden', mode !== 'new');
        }

        function openAddPackage(studentId) {
            document.getElementById('ap-studentId').value = studentId;
            const planSelect = document.getElementById('ap-planId');
            const context = findStudentContext(studentId);
            const plans = context ? groupPackagesByPlan(context.family.students.flatMap(student => student.packages)) : [];
            planSelect.innerHTML = plans
                .filter(plan => plan.PlanStatus !== 'Deleted')
                .map(plan => `<option value="${plan.PlanID}">${plan.PlanName} - ₹${plan.PlanFee}</option>`)
                .join('');
            document.getElementById('ap-planMode').value = planSelect.options.length ? 'existing' : 'new';
            toggleAddPackagePlanMode();
            openModal('addPackageModal');
        }
        function submitAddPackage(e) {
            e.preventDefault();
            const packageId = makeId('PKG');
            const mode = document.getElementById('ap-planMode').value;
            const selectedPlanId = document.getElementById('ap-planId').value;
            const context = findStudentContext(document.getElementById('ap-studentId').value);
            const existingPlan = mode === 'existing' && context
                ? groupPackagesByPlan(context.family.students.flatMap(student => student.packages)).find(plan => plan.PlanID === selectedPlanId)
                : null;
            const payload = {
                action: 'addPackage', studentId: document.getElementById('ap-studentId').value,
                packageId: packageId,
                planId: existingPlan ? existingPlan.PlanID : makeId('PLAN'),
                planName: existingPlan ? existingPlan.PlanName : (document.getElementById('ap-planName').value || document.getElementById('ap-batch').value),
                planFee: existingPlan ? existingPlan.PlanFee : Number(document.getElementById('ap-planFee').value || document.getElementById('ap-fee').value),
                packageName: document.getElementById('ap-batch').value,
                totalClasses: Number(document.getElementById('ap-total').value),
                fee: Number(document.getElementById('ap-fee').value)
            };
            syncAction(payload, () => {
                globalData.forEach(family => family.students.forEach(student => {
                    if (student.StudentID === payload.studentId) {
                        student.packages.push({
                            PackageID: payload.packageId,
                            StudentID: payload.studentId,
                            PackageName: payload.packageName,
                            TotalClasses: payload.totalClasses,
                            ClassesUsed: 0,
                            Fee: payload.fee,
                            Status: 'Active',
                            PlanID: payload.planId,
                            PlanName: payload.planName,
                            PlanFee: payload.planFee,
                            PlanStatus: existingPlan ? existingPlan.PlanStatus : 'Active'
                        });
                    }
                }));
            });
            e.target.reset();
        }

        function openEditPackage(pkg) {
            document.getElementById('ep-packageId').value = pkg.PackageID; document.getElementById('ep-batch').value = pkg.PackageName;
            document.getElementById('ep-total').value = pkg.TotalClasses; document.getElementById('ep-fee').value = pkg.Fee;
            openModal('editPackageModal');
        }
        function submitEditPackage(e) {
            e.preventDefault();
            const payload = {
                action: 'editPackage', packageId: document.getElementById('ep-packageId').value, packageName: document.getElementById('ep-batch').value,
                totalClasses: Number(document.getElementById('ep-total').value), fee: Number(document.getElementById('ep-fee').value)
            };
            syncAction(payload, () => {
                const target = findPackage(payload.packageId);
                if (target) {
                    target.pkg.PackageName = payload.packageName;
                    target.pkg.TotalClasses = payload.totalClasses;
                    target.pkg.Fee = payload.fee;
                }
            });
        }

        loadData();
        setInterval(() => {
            if (activeRequestCount === 0) loadData(true);
        }, 15000);
    </script>
